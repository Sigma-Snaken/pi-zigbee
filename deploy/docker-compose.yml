services:
  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf
    restart: unless-stopped

  zigbee2mqtt:
    image: koenkk/zigbee2mqtt
    ports:
      - "8080:8080"
    volumes:
      - ./zigbee2mqtt:/app/data
    devices:
      - /dev/zigbee:/dev/zigbee
    environment:
      - TZ=Asia/Taipei
    depends_on:
      - mosquitto
    restart: unless-stopped

  app:
    image: ghcr.io/sigma-snaken/sigma-button-controller:latest
    network_mode: host
    volumes:
      - ./data:/app/data
      - /var/run/dbus:/var/run/dbus
    environment:
      - MQTT_HOST=127.0.0.1
      - MQTT_PORT=1883
      - TZ=Asia/Taipei
    depends_on:
      - mosquitto
    restart: unless-stopped
